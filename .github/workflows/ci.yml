---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Yamllint
        uses: karancode/yamllint-github-action@4052d365f09b8d34eb552c363d1141fd60e2aeb2  # master
        with:
          yamllint_file_or_dir: '.'
          yamllint_comment: false

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23
        with:
          globs: 'README.md'

  build_dry_run:
    name: Build dry-run (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-2025-vs2026
          - target: aarch64-pc-windows-msvc
            os: windows-2025-vs2026
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

  e2e_tests:
    name: Native E2E (${{ matrix.os }})
    needs: build_dry_run
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: e2e-${{ matrix.os }}

      - name: Build tooler
        run: cargo build

      - name: Install local tooler (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p "$RUNNER_TEMP/tooler-bin"
          cp target/debug/tooler "$RUNNER_TEMP/tooler-bin/tooler"
          chmod +x "$RUNNER_TEMP/tooler-bin/tooler"
          echo "$RUNNER_TEMP/tooler-bin" >> "$GITHUB_PATH"

      - name: Install local tooler (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\tooler-bin" | Out-Null
          Copy-Item target\debug\tooler.exe "$env:RUNNER_TEMP\tooler-bin\tooler.exe" -Force
          "$env:RUNNER_TEMP\tooler-bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Pull cli/cli and verify shim (Unix)
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOOLER_CONFIG: ${{ runner.temp }}/tooler-e2e/config/config.json
          TOOLER_DATA_DIR: ${{ runner.temp }}/tooler-e2e/data
          TOOLER_BIN_DIR: ${{ runner.temp }}/tooler-bin
        run: |
          tooler version
          tooler pull cli/cli
          gh --version
          tooler info cli/cli

      - name: Pull cli/cli and verify shim (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOOLER_CONFIG: ${{ runner.temp }}\tooler-e2e\config\config.json
          TOOLER_DATA_DIR: ${{ runner.temp }}\tooler-e2e\data
          TOOLER_BIN_DIR: ${{ runner.temp }}\tooler-bin
        run: |
          tooler version
          tooler pull cli/cli
          gh --version
          tooler info cli/cli
